[tool.poetry]
name = "sentiment-app"
version = "0.1.0"
description = "Dutch Movie Review Sentiment Classifier"
authors = ["Amir Douzandeh <amirzenoozi72@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.111.0"
uvicorn = "^0.30.1"
transformers = "^4.41.2"
torch = "^2.3.1"
pandas = "^2.2.2"
scikit-learn = "^1.5.0"
mlflow = "^2.13.1"
